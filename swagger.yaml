      - permission
      - allow
      properties:
        allow:
          type: boolean
          description: '`true` = allow; `false` = deny.'
        permission:
          $ref: '#/components/schemas/Permission'
        role_id:
          type: string
          format: uuid
    RoleResponse:
      type: object
      description: A community role with its permissions
      required:
      - id
      - community_id
      - name
      - is_organisers
      - is_everyone
      - permissions
      properties:
        community_id:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        is_everyone:
          type: boolean
        is_organisers:
          type: boolean
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    StartLoginRequest:
      type: object
      description: Request body for starting passkey login
      required:
      - email
      properties:
        email:
          type: string
          description: The user's email address.
          example: user@hound.chat
    StartLoginResponse:
      type: object
      description: Response body for starting passkey login
      required:
      - user_id
      - options
      properties:
        options:
          type: object
          description: Challenge from the server to pass to navigator.credentials.get()
          required:
          - publicKey
          properties:
            publicKey:
              $ref: '#/components/schemas/PublicKeyCredentialRequestOptionsJSON'
          examples:
          - publicKey:
              challenge: base64-challenge
              rpId: hound.chat
              timeout: 60000
              allowCredentials: []
        user_id:
          type: string
          format: uuid
          description: The user ID required to complete the passkey ceremony.
          example: 018c5b6e-0000-7000-0000-000000000001
    StartRegisterRequest:
      type: object
      description: Request body for starting passkey registration
      required:
      - email
      - display_name
      properties:
        display_name:
          type: string
          description: The name of the device that user is registering to their account.
          example: MacBook Pro
        email:
          type: string
          description: The user's email address used for verification.
          example: user@hound.chat
    StartRegisterResponse:
      type: object
      description: Response body for starting passkey registration
      required:
      - options
      - user_id
      properties:
        options:
          type: object
          description: Challenge from the server to pass to navigator.credentials.create()
          required:
          - publicKey
          properties:
            publicKey:
              $ref: '#/components/schemas/PublicKeyCredentialCreationOptionsJSON'
          examples:
          - publicKey:
              challenge: base64-challenge
              rpId: hound.chat
              timeout: 60000
        user_id:
          type: string
          format: uuid
          description: The provisional user ID to supply when finishing registration.
    UploadResponse:
      type: object
      required:
      - id
      - url
      - content_type
      - size_bytes
      properties:
        content_type:
          type: string
          example: image/webp
        id:
          type: string
          format: uuid
          example: 018f1234-0000-7000-0000-000000000001
        size_bytes:
          type: integer
          format: int64
        url:
          type: string
          example: https://cdn.hound.chat/avatar/018c.../018f....webp
    UserOverwrite:
      type: object
      description: A single permission overwrite entry for a user.
      required:
      - user_id
      - permission
      - allow
      properties:
        allow:
          type: boolean
          description: '`true` = allow; `false` = deny.'
        permission:
          $ref: '#/components/schemas/Permission'
        user_id:
          type: string
          format: uuid
    VoiceJoinResponse:
      type: object
      description: |-
        Response for joining a voice channel.

        The client uses this to:
        1. Present `relay_token` to the SFU on connect (proves they are allowed in).
        2. Configure their iroh endpoint to use `relay_url` for NAT traversal.
        3. Render the participant list with `peers` before any media arrives.
      required:
      - profile
      - relay_url
      - relay_token
      - peers
      properties:
        peers:
          type: array
          items:
            $ref: '#/components/schemas/VoicePeerInfo'
          description: |-
            Other participants already in the channel at the time of joining.
            Populated from the in-memory voice-participant registry.
        profile:
          $ref: '#/components/schemas/MergedProfile'
          description: The joining user's merged community profile (name, avatar, etc.).
        relay_token:
          type: string
          description: |-
            Short-lived HMAC-SHA256 token (15 min TTL) that proves this user
            may connect to the SFU for the given voice channel.

            Format: `{user_id}:{space_id}:{expiry_unix_secs}:{hex_mac}`
        relay_url:
          type: string
          description: |-
            iroh relay URL. Clients must not hardcode this value — use whatever
            the server returns here so that changing relay infrastructure only
            requires a backend deploy, not a client release.
        sfu_node_id:
          type:
          - string
          - 'null'
          description: |-
            iroh node ID of the SFU (hex-encoded public key).

            `None` when the backend is not configured with `SFU_NODE_ID` (e.g.
            in development without a running SFU). Clients skip the direct QUIC
            connection when this is absent.
    VoicePeerInfo:
      type: object
      description: |-
        Minimal information about a voice channel participant.

        Clients use this to render participant avatars and names before any
        media arrives. The SFU assigns its own `peer_id` per connection; we
        don't include that here because clients only need the iroh connection
        to the SFU, not per-peer node IDs.
      required:
      - user_id
      - picture
      properties:
        name:
          type:
          - string
          - 'null'
          description: Display name (from community profile, falls back to global profile).
        picture:
          type: string
          description: Avatar URL.
        user_id:
          type: string
          format: uuid
          description: Stable UUID for this user. Matches the `user_id` in socket.io events.
    WebAuthnResponse:
      type: object
      description: WebAuthn relying party configuration
      required:
      - rp_id
      - origins
      properties:
        origins:
          type: array
          items:
            type: string
          example:
          - https://hound.chat
        rp_id:
          type: string
          example: hound.chat
  securitySchemes:
    refreshToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT refresh token used to obtain a new access token
    token:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token for authenticating API requests
